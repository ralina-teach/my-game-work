<!DOCTYPE html>
<html>
<head>
    <title>SUBWAY SURFERS 3D - МГНОВЕННЫЙ ЗАПУСК</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 38px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 12px 28px;
            border-radius: 30px;
            z-index: 100;
            font-family: monospace;
            border: 2px solid #ffcc00;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            z-index: 100;
            display: none;
            min-width: 420px;
            border: 2px solid #ff9800;
        }
        #gameOver button {
            font-size: 24px;
            padding: 12px 35px;
            margin-top: 25px;
            background: #ff9800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 100;
        }
        .controls kbd {
            background: #222;
            padding: 4px 12px;
            border-radius: 10px;
            margin: 0 4px;
        }
        .info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffcc80;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="score">🏃‍♂️ СЧЁТ: 0</div>
    <div id="gameOver">
        💀 GAME OVER 💀<br>
        <span id="finalScore" style="font-size: 70px; color: #ff9800;">0</span><br>
        <button onclick="location.reload()">🔄 ИГРАТЬ СНОВА</button>
    </div>
    <div class="controls">
        🎮 <kbd>←</kbd> <kbd>→</kbd> - дорожки &nbsp;&nbsp;
        <kbd>↑</kbd> - ПРЫЖОК &nbsp;&nbsp;
        <kbd>↓</kbd> - КУВЫРОК
    </div>
    <div class="info">
        🏪 МАГАЗИНЧИКИ | 🌳 ДЕРЕВЬЯ | 🚂 ПОЕЗДА | ✨ 3D ОБЪЕКТЫ
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';
        const loader = new GLTFLoader();

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 70);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2.8, 7.5);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x88aacc));
        const mainLight = new THREE.DirectionalLight(0xfff5dd, 1.3);
        mainLight.position.set(5, 18, 5);
        mainLight.castShadow = true;
        scene.add(mainLight);
        scene.add(new THREE.PointLight(0xffaa77, 0.5));

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(35, 100),
            new THREE.MeshStandardMaterial({ color: 0x3a6a4a })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.45;
        ground.receiveShadow = true;
        scene.add(ground);

        // ДЕРЕВЬЯ
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const foliageMat = new THREE.MeshStandardMaterial({ color: 0x3a8c3a });
        for (let side = -1; side <= 1; side += 2) {
            for (let z = -25; z < 20; z += 4) {
                const tree = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.32, 1.2, 6), trunkMat);
                trunk.position.y = 0.6;
                trunk.castShadow = true;
                tree.add(trunk);
                const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.45, 0.7, 8), foliageMat);
                foliage1.position.y = 1.15;
                foliage1.castShadow = true;
                tree.add(foliage1);
                const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.38, 0.6, 8), foliageMat);
                foliage2.position.y = 1.65;
                foliage2.castShadow = true;
                tree.add(foliage2);
                const foliage3 = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.5, 8), foliageMat);
                foliage3.position.y = 2.1;
                foliage3.castShadow = true;
                tree.add(foliage3);
                tree.position.set(side * 4.0, -0.35, z);
                scene.add(tree);
            }
        }
        
        // МАГАЗИНЧИКИ
        const shopColors = [0xe74c3c, 0x3498db, 0xf39c12, 0x9b59b6, 0x1abc9c, 0xe67e22];
        for (let i = -24; i < 20; i += 2.5) {
            const shopLeft = new THREE.Group();
            const color = shopColors[Math.floor(Math.random() * shopColors.length)];
            const shopBody = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.7, 1.3), new THREE.MeshStandardMaterial({ color: color }));
            shopBody.position.y = 0.85;
            shopBody.castShadow = true;
            shopLeft.add(shopBody);
            const roofShop = new THREE.Mesh(new THREE.CylinderGeometry(1.05, 1.25, 0.4, 4), new THREE.MeshStandardMaterial({ color: 0xcc8866 }));
            roofShop.position.y = 1.7;
            roofShop.castShadow = true;
            shopLeft.add(roofShop);
            const windowShop = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 0.08), new THREE.MeshStandardMaterial({ color: 0xaaddff }));
            windowShop.position.set(0, 0.95, 0.7);
            shopLeft.add(windowShop);
            shopLeft.position.set(-4.8, -0.4, i);
            scene.add(shopLeft);
            
            const shopRight = new THREE.Group();
            const color2 = shopColors[Math.floor(Math.random() * shopColors.length)];
            const shopBody2 = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.7, 1.3), new THREE.MeshStandardMaterial({ color: color2 }));
            shopBody2.position.y = 0.85;
            shopBody2.castShadow = true;
            shopRight.add(shopBody2);
            const roofShop2 = new THREE.Mesh(new THREE.CylinderGeometry(1.05, 1.25, 0.4, 4), new THREE.MeshStandardMaterial({ color: 0xcc8866 }));
            roofShop2.position.y = 1.7;
            roofShop2.castShadow = true;
            shopRight.add(roofShop2);
            const windowShop2 = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 0.08), new THREE.MeshStandardMaterial({ color: 0xaaddff }));
            windowShop2.position.set(0, 0.95, 0.7);
            shopRight.add(windowShop2);
            shopRight.position.set(4.8, -0.4, i);
            scene.add(shopRight);
        }

        // ДОРОЖКИ
        const railPositions = [-2.3, 0, 2.3];
        const railsGroup = new THREE.Group();
        scene.add(railsGroup);
        
        for (let i = 0; i < 3; i++) {
            for (let z = -35; z < 30; z += 1.4) {
                const sleeper = new THREE.Mesh(
                    new THREE.BoxGeometry(1.5, 0.1, 0.3),
                    new THREE.MeshStandardMaterial({ color: 0x8B5A2B })
                );
                sleeper.position.set(railPositions[i], -0.32, z);
                sleeper.castShadow = true;
                railsGroup.add(sleeper);
            }
            const railMat = new THREE.MeshStandardMaterial({ color: 0xccaa55, metalness: 0.7 });
            const leftRail = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.12, 85), railMat);
            leftRail.position.set(railPositions[i] - 0.5, -0.28, 0);
            leftRail.castShadow = true;
            railsGroup.add(leftRail);
            const rightRail = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.12, 85), railMat);
            rightRail.position.set(railPositions[i] + 0.5, -0.28, 0);
            rightRail.castShadow = true;
            railsGroup.add(rightRail);
        }

        // ===== ИГРОК (3D ОБЪЕКТ) =====
        const playerGroup = new THREE.Group();
        
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.85, 12), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
        body.position.y = 0.42;
        body.castShadow = true;
        playerGroup.add(body);
        
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.36, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
        head.position.y = 0.88;
        head.castShadow = true;
        playerGroup.add(head);
        
        const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.47, 0.52, 0.12, 8), new THREE.MeshStandardMaterial({ color: 0x3498db }));
        cap.position.y = 1.1;
        cap.castShadow = true;
        playerGroup.add(cap);
        
        const scarf = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.2, 0.5), new THREE.MeshStandardMaterial({ color: 0xe74c3c }));
        scarf.position.set(0, 0.6, 0.48);
        playerGroup.add(scarf);
        
        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.7, 0.28), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
        leftArm.position.set(-0.55, 0.6, 0);
        leftArm.castShadow = true;
        playerGroup.add(leftArm);
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.7, 0.28), new THREE.MeshStandardMaterial({ color: 0x2ecc71 }));
        rightArm.position.set(0.55, 0.6, 0);
        rightArm.castShadow = true;
        playerGroup.add(rightArm);
        
        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.62, 0.32), new THREE.MeshStandardMaterial({ color: 0x1e8449 }));
        leftLeg.position.set(-0.26, 0.16, 0);
        leftLeg.castShadow = true;
        playerGroup.add(leftLeg);
        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.62, 0.32), new THREE.MeshStandardMaterial({ color: 0x1e8449 }));
        rightLeg.position.set(0.26, 0.16, 0);
        rightLeg.castShadow = true;
        playerGroup.add(rightLeg);
        
        playerGroup.position.set(0, -0.2, 2.8);
        playerGroup.castShadow = true;
        scene.add(playerGroup);
        
        // ===== ЛОШАДКА (МАЛЕНЬКАЯ, НА ДОРОЖКЕ) =====
        loader.load('https://threejs.org/examples/models/gltf/Horse.glb', (gltf) => {
            const horse = gltf.scene;
            // ПОЗИЦИЯ: на дорожке, перед игроком
            horse.position.set(0, -0.8, 4.5);
            // РАЗМЕР: маленькая (0.08)
            horse.scale.set(0.08, 0.08, 0.08);
            // ПОВОРОТ: смотрит на игрока
            horse.rotation.y = Math.PI;
            // ТЕНИ
            horse.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                }
            });
            scene.add(horse);
            console.log('✅ Маленькая лошадка на дорожке!');
        }, undefined, (error) => {
            console.error('❌ Ошибка загрузки лошадки:', error);
        });
        
        // ===== ПОЕЗДА =====
        function createObstacle(lane, zPos) {
            const group = new THREE.Group();
            const colors = [0xe74c3c, 0x3498db, 0x9b59b6, 0xf39c12, 0x1abc9c];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const wagon = new THREE.Mesh(new THREE.BoxGeometry(1.15, 0.95, 1.6), new THREE.MeshStandardMaterial({ color: color }));
            wagon.position.y = 0.48;
            wagon.castShadow = true;
            group.add(wagon);
            
            const roof = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.7, 1.5, 8), new THREE.MeshStandardMaterial({ color: 0xccaa66 }));
            roof.rotation.z = Math.PI / 2;
            roof.position.y = 0.92;
            roof.castShadow = true;
            group.add(roof);
            
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x88ccff });
            const window1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.45, 0.08), windowMat);
            window1.position.set(0.45, 0.55, 0.85);
            group.add(window1);
            const window2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.45, 0.08), windowMat);
            window2.position.set(-0.45, 0.55, 0.85);
            group.add(window2);
            
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 });
            const leftLight = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), lightMat);
            leftLight.position.set(-0.45, 0.28, 0.88);
            group.add(leftLight);
            const rightLight = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), lightMat);
            rightLight.position.set(0.45, 0.28, 0.88);
            group.add(rightLight);
            
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const wheelPos = [[-0.6, -0.12, 0.7], [0.6, -0.12, 0.7], [-0.6, -0.12, -0.65], [0.6, -0.12, -0.65]];
            wheelPos.forEach(pos => {
                const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.12, 16), wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            group.position.set(railPositions[lane], -0.32, zPos);
            group.castShadow = true;
            scene.add(group);
            return group;
        }
        
        // ===== ПЕРЕМЕННЫЕ =====
        let targetLane = 1;
        let gameRunning = true;
        let score = 0;
        let scrollSpeed = 0.24;
        let baseSpeed = 0.24;
        
        let isJumping = false;
        let isSliding = false;
        let jumpVelocity = 0;
        let originalY = -0.2;
        
        let obstacles = [];
        let frameCounter = 0;
        let spawnDelay = 55;
        
        function updatePlayerPosition() {
            const targetX = railPositions[targetLane];
            playerGroup.position.x += (targetX - playerGroup.position.x) * 0.22;
        }
        
        function spawnObstacle() {
            if (!gameRunning) return;
            const lane = Math.floor(Math.random() * 3);
            obstacles.push({
                mesh: createObstacle(lane, -24),
                lane: lane,
                z: -24
            });
        }
        
        window.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') {
                targetLane = Math.max(0, targetLane - 1);
                e.preventDefault();
            } else if (e.key === 'ArrowRight') {
                targetLane = Math.min(2, targetLane + 1);
                e.preventDefault();
            } else if (e.key === 'ArrowUp' && !isJumping && !isSliding) {
                isJumping = true;
                jumpVelocity = 0.28;
                e.preventDefault();
            } else if (e.key === 'ArrowDown' && !isSliding && !isJumping) {
                isSliding = true;
                playerGroup.children.forEach(child => {
                    if (child.scale) { child.scale.y = 0.5; child.position.y *= 0.5; }
                });
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowDown' && isSliding) {
                isSliding = false;
                playerGroup.children.forEach(child => {
                    if (child.scale) { child.scale.y = 1; child.position.y *= 2; }
                });
            }
        });
        
        let animTime = 0;
        let scrollOffset = 0;
        
        function animate() {
            if (!gameRunning) {
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
                return;
            }
            
            animTime += 0.04;
            scrollOffset += scrollSpeed;
            railsGroup.position.z = scrollOffset % 2;
            
            const legAngle = Math.sin(animTime * 13) * 0.55;
            const armAngle = Math.sin(animTime * 13) * 0.75;
            leftLeg.rotation.x = legAngle;
            rightLeg.rotation.x = -legAngle;
            leftArm.rotation.z = armAngle;
            rightArm.rotation.z = -armAngle;
            
            if (!isJumping && !isSliding) {
                playerGroup.position.y = originalY + Math.sin(animTime * 20) * 0.03;
            }
            
            updatePlayerPosition();
            
            if (isJumping) {
                playerGroup.position.y += jumpVelocity;
                jumpVelocity -= 0.019;
                if (playerGroup.position.y <= originalY) {
                    playerGroup.position.y = originalY;
                    isJumping = false;
                    jumpVelocity = 0;
                }
            }
            
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].z += scrollSpeed;
                obstacles[i].mesh.position.z = obstacles[i].z;
                
                const distanceZ = Math.abs(obstacles[i].z - 2.8);
                const sameLane = obstacles[i].lane === targetLane;
                
                if (sameLane && distanceZ < 0.95 && !isJumping && !isSliding) {
                    gameRunning = false;
                    document.getElementById('gameOver').style.display = 'block';
                    document.getElementById('finalScore').innerHTML = Math.floor(score);
                }
                
                if (obstacles[i].z > 15) {
                    scene.remove(obstacles[i].mesh);
                    obstacles.splice(i, 1);
                    i--;
                }
            }
            
            frameCounter++;
            if (frameCounter > spawnDelay) {
                spawnObstacle();
                frameCounter = 0;
                spawnDelay = 38 + Math.floor(Math.random() * 42);
                scrollSpeed = Math.min(0.48, baseSpeed + score / 1000);
            }
            
            score += 0.22;
            document.getElementById('score').innerHTML = `🏃‍♂️ СЧЁТ: ${Math.floor(score)}`;
            
            camera.position.x += (playerGroup.position.x - camera.position.x) * 0.07;
            const camY = 2.6 + (isJumping ? 0.5 : 0);
            camera.position.y += (camY - camera.position.y) * 0.1;
            camera.lookAt(playerGroup.position.x, 1.2 + (isJumping ? 0.6 : 0), playerGroup.position.z - 1);
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        setTimeout(() => spawnObstacle(), 1000);
        setTimeout(() => spawnObstacle(), 2200);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
